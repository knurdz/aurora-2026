
services:
  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt protocol
    environment:
      NEO4J_AUTH: neo4j/verischolar_secret
    volumes:
      - neo4j_data:/data
    networks:
      - verischolar_net

  chromadb:
    image: chromadb/chroma:0.5.0
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - verischolar_net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ANONYMIZED_TELEMETRY: "False"

    depends_on:
      neo4j:
        condition: service_started
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - verischolar_net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - verischolar_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - verischolar_net

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - verischolar_net

volumes:
  neo4j_data:
  chroma_data:
  ollama_models:

networks:
  verischolar_net:
    driver: bridge